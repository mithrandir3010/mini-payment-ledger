name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      # Testcontainers: Ryuk reaper disabled — stable in GitHub-hosted runners
      # (Ryuk needs privileged Docker socket access that is unreliable in CI)
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'        # caches ~/.m2/repository keyed on pom.xml hash

      - name: Run tests
        run: mvn verify -B --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run checkstyle
        run: mvn checkstyle:check -B --no-transfer-progress

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Build Docker image
        run: docker build -t mini-payment-ledger:${{ github.sha }} .
